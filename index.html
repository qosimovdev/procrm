<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords"
    content="ProCRM, project management, task tracking, team collaboration, productivity, project planning, project tracking, project organization" />
  <meta name="author" content="Ibrohim Qosimov" />
  <title>ProCRM | Project & Team Management Platform</title>
  <meta name="description"
    content="ProCRM helps teams manage projects, tasks, deadlines, and collaboration in one powerful platform." />

  <!-- Open Graph -->
  <meta property="og:title" content="ProCRM | Manage Projects & Teams Efficiently" />
  <meta property="og:description"
    content="ProCRM is a modern CRM platform for managing projects, tasks, teams, and workflows efficiently." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://procrmm.vercel.app/" />
  <meta property="og:image" content="https://procrmm.vercel.app/og-banner.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="ProCRM" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ProCRM | Smart Project & Team Management" />
  <meta name="twitter:description"
    content="Boost productivity with ProCRM — manage tasks, projects, deadlines, and team collaboration in one place." />
  <meta name="twitter:image" content="https://procrmm.vercel.app/og-banner.png" />
  <style>
    #initial-loader {
      width: 100%;
      height: 100vh;
      position: fixed;
      inset: 0;
      background: #0b0b14;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 99999;
    }

    .glow {
      position: absolute;
      border-radius: 9999px;
      filter: blur(80px);
    }

    .glow-1 {
      width: 18rem;
      height: 18rem;
      background: rgba(124, 92, 255, 0.2);
    }

    .glow-2 {
      width: 24rem;
      height: 24rem;
      background: rgba(139, 92, 246, 0.1);
      top: 5rem;
      right: 5rem;
    }

    .loader-card {
      position: relative;
      z-index: 10;
      padding: 25px 55px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(30px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .loader-card h1 {
      font-size: 38px;
      font-weight: bold;
      color: #a855f7;
      margin-bottom: 20px;
    }

    .spinner-wrapper {
      position: relative;
      width: 64px;
      height: 64px;
      margin: auto;
    }

    .spinner-bg {
      width: 64px;
      height: 64px;
      border-radius: 9999px;
      border: 4px solid rgba(124, 92, 255, 0.2);
    }

    .spinner {
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      border: 4px solid #a955f7ea;
      border-top-color: transparent;
      animation: spin 0.9s linear infinite;
    }

    .loader-card p {
      margin-top: 20px;
      color: #9ca3af;
      font-size: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="loader-card">
      <h1>ProCRM</h1>

      <div class="spinner-wrapper">
        <!-- <div class="spinner-bg"></div> -->
        <div class="spinner"></div>
      </div>

      <p>Loading your workspace...</p>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
